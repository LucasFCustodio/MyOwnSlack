<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    .container{
        margin-top: 30px;
    }
    input{
        height: 35px;
        width: 100%;
    }
    #messages{
        list-style-type: none;
        margin: 0;
        padding: 0;
    }
    #messages li{
        padding: 5px 10px;
    }
    #message li:nth-child(odd){
        background: #aaa;
    }
</style>

<div class="container text-center">
    <form class="row" id="message-form">
        <div class="col-6">
            <input id="user-message" type="text" placeholder="Enter your message" />
        </div>
        <div class="col-2">
            <input class="btn btn-primary" type="submit" value="Send!" />
        </div>
    </form>

    <ul id="messages">
        <!-- THIS WILL BE POPULATED BY JAVASCRIPT! -->
    </ul>

</div>

<script src="socket.io/socket.io.js"></script>

<script>
    //This socket is the client socket. It connects to the 
    //socket server that is receiving information from port 8000
    const socket = io("http://localhost:8000");

    socket.on("connect", () => {
        //write code
    })

    socket.on("serverMessage", (serverData) => {
        console.log(serverData);
    })

    socket.on("newMessageToClients", (serverMessage) => {
        console.log(serverMessage);
        document.querySelector('#messages').innerHTML += `<li>${serverMessage.clientData}</li>`;
    })

    document.querySelector('#message-form').addEventListener('submit', (event) => {
        event.preventDefault(); //So the browser does not refresh the page when we submit

        //The message the user typed in #user-message will be stored in newMessage
        const newMessage = document.querySelector('#user-message').value;
        
        //This emit sends the client message to the server
        socket.emit("clientMessage", {clientData: newMessage});
    })
    
</script>
